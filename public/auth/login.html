<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | 聞き流し偉人伝</title>
  <link rel="icon" href="/images/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; }
    .font-serif { font-family: 'Noto Serif JP', serif; }

    /* Patreonボタン */
    .btn-patreon {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #1e3a8a;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .08em;
      padding: 1rem 2rem;
      border-radius: 999px;
      text-decoration: none;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 8px 24px rgba(30,58,138,.28);
    }
    .btn-patreon:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(30,58,138,.38);
    }
    .btn-patreon:active { transform: translateY(0); }

    /* カードのフェードイン */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-card { animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .1s both; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-50">
    <nav class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="/" class="flex items-center">
        <img src="https://lh3.googleusercontent.com/d/1NJyA-FZNuKbZaFHfXanbY8wophUeZKgK"
          alt="聞き流し偉人伝"
          class="h-100 w-auto object-contain"
          style="min-height: 50px; max-height: 190px;">
      </a>
      <div class="flex items-center gap-10">
        <div class="hidden md:flex gap-10 text-sm font-bold tracking-widest uppercase text-slate-500">
          <a href="../index.html" class="hover:text-blue-600 transition">ホーム</a>
        </div>
        <a
          href="https://www.patreon.com/c/ijinden/posts"
          target="_blank"
          rel="noopener noreferrer"
          class="hidden md:inline-block bg-blue-900 text-white px-6 py-2.5 rounded-full text-xs font-bold tracking-widest uppercase hover:bg-blue-800 transition shadow-lg text-center"
        >
          Patreon
        </a>
      </div>
    </nav>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center pt-20 px-4 py-16">
    <div class="login-card w-full max-w-md">

      <!-- Card -->
      <div class="bg-white rounded-3xl shadow-xl border border-slate-100 px-10 py-12 text-center">

        <!-- Logo mark -->
        <div class="w-24 h-24 mx-auto mb-6 rounded-3xl bg-white shadow-lg border border-slate-100 flex items-center justify-center overflow-hidden" style="box-shadow: 0 8px 24px rgba(0,0,0,.10);">
          <img src="../images/patreon.png" alt="Patreon" class="w-20 h-20 object-cover" style="transform: scale(1.25); transform-origin: center;">
        </div>

        <p class="text-xs font-bold tracking-widest uppercase text-blue-600 mb-2">Supporter Login</p>
        <h1 class="font-serif text-2xl font-black text-blue-900 mb-3 leading-snug">
          サポーターとして<br>ログイン
        </h1>
        <p class="text-sm text-slate-500 leading-relaxed mb-8">
          Patreon アカウントでログインすると、<br>
          サポーター限定コンテンツにアクセスできます。
        </p>

        <!-- Patreon OAuth ボタン -->
        <a id="patreon-login-btn" href="#" class="btn-patreon w-full mb-4">
          Patreon でログイン
        </a>

        <p class="text-[11px] text-slate-400 leading-relaxed">
          ログインすることで
          <a href="https://www.patreon.com/policy" target="_blank" rel="noopener noreferrer" class="underline hover:text-blue-600">Patreon の利用規約</a>
          に同意したものとみなされます。
        </p>

        <div class="mt-8 pt-8 border-t border-slate-100">
          <p class="text-[12px] text-slate-400 mb-3">まだサポーターでない方は</p>
          <a
            href="https://www.patreon.com/c/ijinden/posts"
            target="_blank"
            rel="noopener noreferrer"
            class="inline-block border-2 border-blue-900 text-blue-900 text-xs font-bold tracking-widest uppercase px-6 py-2.5 rounded-full hover:bg-blue-50 transition"
          >
            サポーターになる
          </a>
        </div>
      </div>

      <!-- Back link -->
      <p class="text-center mt-6 text-xs text-slate-400">
        <a href="#" onclick="history.back(); return false;" class="hover:text-blue-600 transition">← 戻る</a>
      </p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-12 text-center bg-white border-t border-slate-100">
    <div class="text-xl font-serif font-black text-blue-900 mb-4">聞き流し偉人伝</div>
    <div class="flex justify-center gap-6 mb-8 text-xs font-bold text-slate-400 tracking-widest uppercase">
      <a href="https://x.com/nasutokai" class="hover:text-blue-600" target="_blank" rel="noopener noreferrer">X（twitter）</a>
      <a href="https://open.spotify.com/show/6MJCKLzXCPOoMHt6G0B42d?si=106a8428f2784243" class="hover:text-blue-600" target="_blank" rel="noopener noreferrer">Spotify</a>
      <a href="https://podcasts.apple.com/jp/podcast/%E6%AD%B4%E5%8F%B2%E3%82%92%E7%B4%90%E8%A7%A3%E3%81%8F-%E8%81%9E%E3%81%8D%E6%B5%81%E3%81%97%E5%81%89%E4%BA%BA%E4%BC%9D/id1623824742" class="hover:text-blue-600" target="_blank" rel="noopener noreferrer">Apple</a>
      <a href="https://music.amazon.co.jp/podcasts/73f4acbb-8f7b-4590-9d07-6feab464bd5b/%E6%AD%B4%E5%8F%B2%E3%82%92%E7%B4%90%E8%A7%A3%E3%81%8F%EF%BC%81%E8%81%9E%E3%81%8D%E6%B5%81%E3%81%97%E5%81%89%E4%BA%BA%E4%BC%9D" class="hover:text-blue-600" target="_blank" rel="noopener noreferrer">Amazon</a>
    </div>
    <p class="text-slate-400 text-[10px] font-bold tracking-widest uppercase">&copy; 2024 Ijin-den Podcast.</p>
  </footer>

  <script>
    // Patreon OAuth 設定
    // client_id は Patreon Developer Portal で取得した値に差し替えてください
    const PATREON_CLIENT_ID = 'zGE8QOeKsm4pgBVp61GphRpID6TKhYpjVaU4gwX4uMM1pAVw6gl95-4Ucx_4U_4B';
    const REDIRECT_URI = encodeURIComponent(window.location.origin + '/auth/callback.html');
    const SCOPE = encodeURIComponent('identity identity[email] identity.memberships');
    const STATE = crypto.randomUUID(); // CSRF 対策

    // state をセッションストレージに保存して callback で検証
    sessionStorage.setItem('patreon_oauth_state', STATE);

    // ログイン後の遷移先を保存（直前のページ、なければダッシュボード）
    const redirectTo = document.referrer || (window.location.origin + '/reports.html');
    sessionStorage.setItem('login_redirect', redirectTo);

    const authURL =
      `https://www.patreon.com/oauth2/authorize` +
      `?response_type=code` +
      `&client_id=${PATREON_CLIENT_ID}` +
      `&redirect_uri=${REDIRECT_URI}` +
      `&scope=${SCOPE}` +
      `&state=${STATE}`;

    document.getElementById('patreon-login-btn').href = authURL;
  </script>

</body>
</html>
